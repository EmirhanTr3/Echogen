chat:
  enabled: true
  format: "<prefix><name><suffix> <reset><#809090>»</#809090> <white><message>"
  item:
    enabled: true
    permission: false

  staffchat:
    format: "<dark_aqua>[<aqua>SC</aqua>]</dark_aqua> <aqua><prefix><name><suffix></aqua> <#809090>»</#809090> <white><message>"
  ownerchat:
    format: "<dark_red>[<red>OC</red>]</dark_red> <red><prefix><name><suffix></red> <#809090>»</#809090> <white><message>"
    uuid-only: false
    uuids:
      - "60ed572b-8e0b-46f0-ae5c-dc7514aeb4dd"

  messages:
    join: "<gray>[<green>+</green>]</gray> <green><name></green>"
    leave: "<gray>[<red>-</red>]</gray> <red><name></red>"

  filter:
    - nword:
        regex: \b(?!minigames?|shenanigans?|night)\w*n+ ?(?:i|1|!)+ ?g+ ?g?+ ?(?:e|a)?+ ?r?+\w*
        type: censor

  prefix:
    enabled: true
    blacklist:
      - badexample
    extra:
      - example:
          name: <light_purple>Example
          prefix: "<light_purple>[Example] "
          description:
            - "An example prefix added by default."
            - "You can remove this prefix from the Echogen config."

scoreboard:
  enabled: true
  title: "<red>scoreboard"
  lines:
    - "<aqua>test"
    - "<red>hi"
    - "<aqua>You are <player>"
  replacements:
    - line: 1
      mode: INSERT
      condition: "%player_is_flying% == yes"
      replacement: "<rainbow>You are flying</rainbow>"

    - line: 3
      condition: "%player_name% == FemboyEmir"
      regex: "<player>"
      replacement: "<gradient:#D260A5:#E4AFCD:#FEFEFE:#57CEF8:#FEFEFE:#E4AFCD:#D260A5>%player_name%</gradient>"

    - line: 1
      condition:
        - "%player_name% == FemboyEmir"
        - "%player_gamemode% == CREATIVE"
      replacement: "test replaced"

    - mode: ADD
      condition: "%player_gamemode% == SURVIVAL"
      replacement: "<pride:gay>you are survivaling</pride>"

    - line: 1
      mode: DELETE
      condition: "%player_gamemode% != CREATIVE"

other:
  heal-also-feeds: true